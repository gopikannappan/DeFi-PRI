  <g transform="translate(710, 440)">
    <rect x="0" y="0" width="200" height="70" rx="8" fill="#FAECE7"/>
    <text x="20" y="30" font-size="13" font-weight="500" fill="#4A1B0C" letter-spacing="1" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">BAND D · 40–54</text>
