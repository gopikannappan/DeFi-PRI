<svg width="1280" height="640" viewBox="0 0 1280 640" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>DeFi Protocol Risk Index v0.1 — transparent governance scoring for 10 top DeFi protocols</title>
  <desc>Social preview image showing the project name, key finding (51-point spread across 10 protocols), and band distribution.</desc>

  <rect x="0" y="0" width="1280" height="640" fill="#FAFAF7"/>

  <line x1="80" y1="80" x2="1200" y2="80" stroke="#D3D1C7" stroke-width="0.5"/>

